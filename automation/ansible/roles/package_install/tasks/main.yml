---
- name: Install packages on RedHat/CentOS
  package:
    name: "{{ redhat_packages }}"
    state: present
  when: ansible_os_family == "RedHat"

- name: Install packages on Ubuntu
  apt:
    name: "{{ ubuntu_packages }}"
    state: present
    update_cache: yes
  when: ansible_os_family == "Debian"
